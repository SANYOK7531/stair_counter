tracker_type: botsort

track_high_thresh: 0.4
track_low_thresh: 0.1
new_track_thresh: 0.5

# больше буфер — трекер дольше "помнит" пропавшего человека
# и может восстановить тот же track_id после короткой потери
track_buffer: 150

match_thresh: 0.8

fuse_score: true
gmc_method: sparseOptFlow

proximity_thresh: 0.5
appearance_thresh: 0.0

# встроенный ReID BoT-SORT — помогает при кратковременных перекрытиях
with_reid: true

# обязательное поле в новых версиях ultralytics:
# "auto" — пусть сам подберёт ReID-модель,
# либо укажи путь к конкретной (например yolo11n-cls.pt)
model: auto
